kind = "web"
previewPath = "/"
title = "ArugaBai Landing Page"
version = "1.0.0"
id = "artifacts/arugabai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22707

[services.development]
run = "pnpm --filter @workspace/arugabai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arugabai", "run", "build" ]
publicDir = "artifacts/arugabai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22707"
BASE_PATH = "/"
